<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Selectors</title>
</head>
<style>
    /* Element Selector */
    /* div{
        background-color: red;
    } */

    /* Class Selector */
     .red{
        background-color: red;
     }

    /* Id Selector */
    #green{
        background-color: green;
    }

    /* Child Selector */
    div > p{
        color: orangered;
        background-color: blueviolet;
    }

    /* Descendent selector  */
    div p{
        color: black;
        background-color: beige;
    }

    /* Universal Selector */
    *{
        margin:0;
        padding:0;
    }
    /* Pseudo Selectors */
    a:visited{
        color: brown;
    }
    a:link{
        color:turquoise
    }
    a:active{
        background-color: red;
    }
    a:hover{
        background-color: blanchedalmond;
    }
</style>
<body>
    <div class = red>
        I am a div
        <article>
            <p>I am a para inside div</p>
        </article>
        
    </div>

    <div id = green>
        I am another div
    </div>
    <a href = "https://www.google.com">Go to google</a>
    <a href = "https://www.facebook2.com">Go to facebook</a>

</body>
</html>
