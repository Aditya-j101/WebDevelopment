<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        body{
            background-color: greenyellow;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
        }
        nav{
            position:sticky;
            width: 100%;
            background-color: aqua;
            border: 2px solid black;
            text-align: center;
        }
        .container{
            margin: 40px auto;
            width: 90%;
            background-color: beige;
            min-height: 400px;
            border: 2px solid black;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 40px;
        }
        .box{
            width: 300px;
            border: 2px solid black;
            height: 300px;
        }

    </style>
</head>
<body>
    <nav> My Nav Bar</nav>
    <div class="container">
        <div class="box">First Box</div>
        <div class="box">Another Box</div>
    </div>
    
</body>
</html>
