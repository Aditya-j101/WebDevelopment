<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Design</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Sticky Navbar */
        nav {
            position: sticky;
            top: 0;
            background-color: #f7a3ea;
            height: 70px;
            width: 100%;
            z-index: 1000;
        }

        /* Section containing the two boxes */
        .main-container {
            background-color: green;
            padding: 50px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            min-height: 400px;
        }

        .box {
            width: 280px;
            height: 280px;
        }

        .box1 {
            background-color: #f39ca0;
        }

        .box2 {
            background-color: #4a8fe7;
        }

        /* Footer */
        footer {
            background-color: #000;
            min-height: 280px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Rounded Rectangle */
        .message-box {
            width: 80%;
            max-width: 700px;
            padding: 35px;
            border: 2px solid white;
            border-radius: 40px;
            text-align: center;
            color: white;
            font-size: 2rem;
            line-height: 1.4;
        }

        /* Bottom-right sticky item */
        .floating-item {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: orange;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>

<body>

    <nav></nav>

    <section class="main-container">
        <div class="box box1"></div>
        <div class="box box2"></div>
    </section>

    <footer>
        <div class="message-box">
            Welcome to this Sigma Web<br>
            Development Express
        </div>

        <div class="floating-item"></div>
    </footer>

</body>
</html>
