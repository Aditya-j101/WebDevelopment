<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows and Outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px #34982b;
        }
        .text-element{
            text-shadow: 2px 2px 4px #d32020;
            outline: 2px solid green;
            border: 2px solid black;
            outline-offset: 5px;

        }
    </style>
</head>
<body>
    <div class="box">I am a box</div>
    <p class="text-element ">Lorem ipsum dolor sit amet consectetur adipisicing elit. Iste vitae eum dolore unde eos provident, facilis minus cumque dolor doloribus? Rem suscipit numquam placeat aliquam mollitia quisquam libero fuga dignissimos impedit hic.</p>
</body>
</html>
