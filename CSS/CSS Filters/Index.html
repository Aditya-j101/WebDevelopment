<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .img1{
            filter:brightness(180%);
        }
        .img2{
            filter:grayscale(50%);
        }
        .img3{
            filter:invert(.21);
        }
    </style>
    <title>CSS Filters</title>
</head>
<body>
    <div class="container">
        <img class = "img1" src="https://tse2.mm.bing.net/th/id/OIP.ibQjkVHZTymZk-Ga7Ka0uQHaEK?pid=Api&P=0&h=180" alt="">
        <img class = "img2" src="https://tse1.mm.bing.net/th/id/OIP._hQzbuCu99ezHFhbTr6XLgHaJ4?pid=Api&P=0&h=180" alt="">
        <img class = "img3" src="https://tse3.mm.bing.net/th/id/OIP.a19her3-qv0liQAem8xtVgHaEK?pid=Api&P=0&h=180" alt="">
    </div>
    
</body>
</html>
